# cargo-generate manifest for the sim-flow `new model` template.
#
# Built-in placeholders provided by cargo-generate:
#   {{project-name}}   kebab-case project name (--name)
#   {{crate_name}}     snake_case rust identifier derived from project-name
#
# Custom placeholders defined below; the sim-flow CLI passes runtime
# values via `--define` so the displayed defaults are placeholders only.
# When invoked directly with `cargo generate`, the prompts pick these
# defaults up.

[template]
cargo_generate_version = ">=0.18.0"

[placeholders.foundation_repo]
type = "string"
prompt = "sim-foundation git URL"
default = "ssh://git@github.com/NumentaCorp/sim-foundation.git"
regex = ".+"

[placeholders.foundation_rev]
type = "string"
prompt = "Pinned sim-foundation git revision"
default = "0000000000000000000000000000000000000000"
regex = "[a-f0-9]{40}"

[placeholders.library_path]
type = "string"
prompt = "Relative path from the generated project to sim-models/library"
default = "../../library"
regex = ".+"

[placeholders.sim_flow_repo]
type = "string"
prompt = "sim-flow git URL"
default = "ssh://git@github.com/NumentaCorp/sim-flow.git"
regex = ".+"

[placeholders.sim_flow_rev]
type = "string"
prompt = "sim-flow git revision that generated this project"
default = "unknown"
regex = ".+"

[placeholders.sim_flow_version]
type = "string"
prompt = "sim-flow crate version that generated this project"
default = "0.1.0"
regex = ".+"

[placeholders.timestamp]
type = "string"
prompt = "ISO-8601 UTC generation timestamp (e.g. 2026-05-19T16:00:00Z)"
default = "1970-01-01T00:00:00Z"
regex = ".+"
