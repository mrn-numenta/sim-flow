name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read
  packages: read

# CI image tag. Defaults to `:latest` (auto-picks up image fixes) when the
# repository variable `CI_IMAGE_TAG` is unset. Set `vars.CI_IMAGE_TAG` to
# a specific commit SHA via Settings -> Secrets and variables -> Actions
# -> Variables to pin reproducibly; `build-ci-image.yml` pushes both
# `:latest` and `:<sha>` for every successful build, so any past build is
# pinnable. (`env:` would be cleaner but isn't a permitted context for
# `container.image:` at job-define time.)

jobs:
  quality:
    name: Fmt Clippy Test
    # Skip on forks: a fork's GITHUB_TOKEN can't pull our private GHCR image,
    # so the workflow would fail at container init and spam red X's on every
    # push to a fork's master. `pull_request` events run in the base repo
    # context, so PRs from forks still satisfy this gate.
    if: github.repository == 'NumentaCorp/sim-flow' || github.repository == 'mrn-numenta/sim-flow'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/sim-flow-ci:${{ vars.CI_IMAGE_TAG || 'latest' }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        # Container jobs default to `sh` (dash on Debian), which does not
        # support `set -o pipefail`. Use bash explicitly so `run:` scripts
        # behave like they do on host runners.
        shell: bash

    steps:
      # Manual checkout (replicating the relevant subset of actions/checkout)
      # is duplicated across every job below and in build-ci-image.yml. A
      # local composite action would normally DRY this up, but local actions
      # require a prior checkout to be resolvable, and our constraint forbids
      # the third-party action that would normally provide that checkout.
      - name: Manual checkout
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git init -q .
          git config --global --add safe.directory "$PWD"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          # Pass auth via inline `-c http.extraheader` so the token is scoped
          # to the single fetch and never lands in `.git/config` (which lives
          # in the workspace and could leak via subsequent steps).
          AUTH=$(printf 'x-access-token:%s' "${GH_TOKEN}" | base64 -w0)
          # Fetch by GITHUB_REF (always-advertised: branch ref or
          # refs/pull/<n>/merge) rather than the raw SHA, which is not
          # guaranteed reachable for unadvertised commits like PR merges.
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${AUTH}" \
              fetch --depth=1 origin "${GITHUB_REF}:refs/remotes/origin/_ci_head"
          git checkout -q "refs/remotes/origin/_ci_head"

      # `foundation-framework` + `block-diagram` are baked into the CI image
      # as a local mirror at /opt/sim-foundation.git, with a system-wide
      # gitconfig `insteadOf` rewrite from the ssh:// URL to file://. Cargo
      # (in the image with CARGO_NET_GIT_FETCH_WITH_CLI=true) honors that
      # rewrite and resolves the locked SHA without any network or
      # credentials — which is what lets fork PRs build the private dep.
      # See .github/ci-image/Dockerfile and build-ci-image.yml.

      - name: Verify locked foundation SHA is in baked mirror
        run: |
          set -euo pipefail
          FOUNDATION_SHA=$(grep -oE 'sim-foundation\.git#[a-f0-9]+' Cargo.lock | head -1 | cut -d'#' -f2)
          if [ -z "${FOUNDATION_SHA}" ]; then
            echo "::error::Could not extract sim-foundation SHA from Cargo.lock." >&2
            exit 1
          fi
          if ! git --git-dir=/opt/sim-foundation.git cat-file -e "${FOUNDATION_SHA}" 2>/dev/null; then
            echo "::error::Locked sim-foundation SHA ${FOUNDATION_SHA} is not present in the baked CI image mirror at /opt/sim-foundation.git." >&2
            echo "::error::The CI image is older than this lockfile and needs rebuilding before cargo can resolve foundation." >&2
            echo "::error::Fix: Actions → Build CI Image → Run workflow → select this branch. The dispatched run will push ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/sim-flow-ci:<that-sha>. Then either:" >&2
            echo "::error::  - set 'vars.CI_IMAGE_TAG' to that SHA so this CI run picks it up, or" >&2
            echo "::error::  - merge to master, which republishes ':latest' from the new image." >&2
            echo "::error::Re-run this workflow afterwards." >&2
            exit 1
          fi
          echo "sim-foundation ${FOUNDATION_SHA}: present in baked mirror"

      # Defense against drift to a feature-branch SHA. Consumers (sim-models)
      # depend on sim-foundation directly AND transitively through sim-flow;
      # if sim-flow pins a foundation SHA that's not on sim-foundation's
      # master, Cargo's unification in the consumer can't pick it without
      # also moving that consumer off master, which is rarely intended.
      # `merge-base --is-ancestor` checks reachability from master regardless
      # of how many commits have landed since the mirror was baked.
      - name: Verify foundation SHA is on sim-foundation master
        run: |
          set -euo pipefail
          FOUNDATION_SHA=$(grep -oE 'sim-foundation\.git#[a-f0-9]+' Cargo.lock | head -1 | cut -d'#' -f2)
          if ! git --git-dir=/opt/sim-foundation.git merge-base --is-ancestor "${FOUNDATION_SHA}" refs/heads/master 2>/dev/null; then
            echo "::error::sim-flow's Cargo.lock pins sim-foundation@${FOUNDATION_SHA}, which is not reachable from sim-foundation's master branch." >&2
            echo "::error::Consumers (sim-models) cannot pull this SHA from master and the unified dep tree won't resolve cleanly." >&2
            echo "::error::Either rebase the foundation change onto master, or run \`cargo update -p foundation-framework\` to pick up a master-reachable SHA." >&2
            exit 1
          fi
          echo "sim-foundation ${FOUNDATION_SHA}: on master"

      - name: Verify Cargo.toml has no local foundation patch
        run: ./scripts/checks.sh no-local-patch

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        # `#[ignore]`-marked tests carry forward six pre-existing failures
        # from `mneilly/ai-flow`; the rest must pass.
        run: cargo test

  coverage:
    name: Coverage Gate
    if: github.repository == 'NumentaCorp/sim-flow' || github.repository == 'mrn-numenta/sim-flow'
    runs-on: ubuntu-latest
    permissions:
      # Overrides the workflow-level `contents: read` so the `Publish coverage
      # history` step (which runs only on master push) can push to the
      # `coverage-reports` orphan branch. Still need `packages: read` to pull
      # the CI container image from GHCR.
      contents: write
      packages: read
    container:
      image: ghcr.io/${{ github.repository_owner }}/sim-flow-ci:${{ vars.CI_IMAGE_TAG || 'latest' }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Manual checkout
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git init -q .
          git config --global --add safe.directory "$PWD"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          AUTH=$(printf 'x-access-token:%s' "${GH_TOKEN}" | base64 -w0)
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${AUTH}" \
              fetch --depth=1 origin "${GITHUB_REF}:refs/remotes/origin/_ci_head"
          git checkout -q "refs/remotes/origin/_ci_head"

      # foundation-framework + block-diagram are resolved from the baked
      # mirror in the CI image — see the quality job above for the full
      # explanation.

      - name: Verify locked foundation SHA is in baked mirror
        run: |
          set -euo pipefail
          FOUNDATION_SHA=$(grep -oE 'sim-foundation\.git#[a-f0-9]+' Cargo.lock | head -1 | cut -d'#' -f2)
          if [ -z "${FOUNDATION_SHA}" ]; then
            echo "::error::Could not extract sim-foundation SHA from Cargo.lock." >&2
            exit 1
          fi
          if ! git --git-dir=/opt/sim-foundation.git cat-file -e "${FOUNDATION_SHA}" 2>/dev/null; then
            echo "::error::Locked sim-foundation SHA ${FOUNDATION_SHA} is not present in the baked CI image mirror at /opt/sim-foundation.git." >&2
            echo "::error::The CI image is older than this lockfile and needs rebuilding before cargo can resolve foundation." >&2
            echo "::error::Fix: Actions → Build CI Image → Run workflow → select this branch. The dispatched run will push ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/sim-flow-ci:<that-sha>. Then either:" >&2
            echo "::error::  - set 'vars.CI_IMAGE_TAG' to that SHA so this CI run picks it up, or" >&2
            echo "::error::  - merge to master, which republishes ':latest' from the new image." >&2
            echo "::error::Re-run this workflow afterwards." >&2
            exit 1
          fi
          echo "sim-foundation ${FOUNDATION_SHA}: present in baked mirror"

      - name: Run coverage workflow
        run: ./scripts/checks.sh coverage

      - name: Enforce per-file 80% coverage minimum
        run: |
          # Coverage gate is currently disabled. Re-enable after a concerted
          # coverage push brings the crate up to threshold; the
          # `Publish coverage summary` step below continues to surface
          # per-file numbers as advisory signal in the meantime. To restore
          # enforcement, replace this echo with the jq filter that flags
          # files under 80% line coverage (see git history for the prior
          # implementation).
          echo "Coverage gate temporarily disabled; see step comment."

      - name: Publish coverage summary
        if: always()
        run: |
          {
            echo "## Coverage"
            echo
            head -40 target/llvm-cov/coverage-summary.txt
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish coverage history
        # Only update the trend branch from successful master pushes — PR
        # runs and feature-branch pushes (which can't reach this gate anyway
        # given the trigger filters, but defense in depth) must not affect
        # the published series.
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/publish-coverage.sh

  vscode-extension:
    name: VS Code Extension
    if: github.repository == 'NumentaCorp/sim-flow' || github.repository == 'mrn-numenta/sim-flow'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/sim-flow-vscode

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Compile
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unit tests
        run: npm run test

  # Single aggregator job for branch-protection to gate on. When any subset
  # is skipped (e.g. on a fork), this job treats `skipped` as success and
  # only fails on a real failure.
  ci_result:
    name: CI result
    needs: [quality, coverage, vscode-extension]
    if: always() && (github.repository == 'NumentaCorp/sim-flow' || github.repository == 'mrn-numenta/sim-flow')
    runs-on: ubuntu-latest
    steps:
      - name: Check required job results
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
          VSCODE_RESULT: ${{ needs.vscode-extension.result }}
        run: |
          set -eu
          failed=0
          for entry in "quality=${QUALITY_RESULT}" "coverage=${COVERAGE_RESULT}" "vscode-extension=${VSCODE_RESULT}"; do
            name="${entry%%=*}"
            result="${entry#*=}"
            case "${result}" in
              success|skipped)
                printf '  %s: %s\n' "${name}" "${result}"
                ;;
              *)
                printf '  %s: %s (fail)\n' "${name}" "${result}" >&2
                failed=1
                ;;
            esac
          done
          exit "${failed}"
